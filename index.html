<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Track Your Order — MTVHOOPS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-border top"></div>
  <header class="site-header container">
    <div class="logo-wrap">
      <div class="logo-box">★</div>
      <h1 class="logo">MTVHOOPS</h1>
    </div>
  </header>

  <main>
    <section class="track-hero">
      <div class="overlay"></div>
      <div class="container track-inner">
        <h2 class="track-title"><span>TRACK</span><span>YOUR</span><span>ORDER</span></h2>
        <p class="lead">Enter your order ID below to see real-time shipping updates for your MTVHOOPS order.</p>

        <form id="track-form" class="track-form" onsubmit="return submitTrack(event)">
          <div class="input-wrap">
            <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M21 21l-4.35-4.35" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="11" cy="11" r="6" stroke="#888" stroke-width="2"/></svg>
            <input id="order-id" type="text" placeholder="e.g. MTVHOOPS-12345" aria-label="Order ID">
          </div>
          <button class="btn track-btn">TRACK ORDER →</button>
        </form>

        <p class="hint">DON'T HAVE AN ORDER ID? CHECK YOUR INSTAGRAM DMS.</p>

        <div id="track-result" class="track-result" hidden>
          <!-- populated by JS -->
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">© 2026 MOTIVATION HOOPS. @MTVHOOPS.LEGIT</div>
  </footer>
  <div class="page-border bottom"></div>

  <script src="script.js"></script>
</body>
</html>
